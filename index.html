<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Source Datasets Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        th { cursor: pointer; user-select: none; transition: color 0.2s; }
        th:hover { color: #2563eb !important; }
        table { table-layout: fixed; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-6"> <div class="w-full mx-auto px-2 md:px-4"> 
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Open-Source Datasets Index</h1>
            <p class="text-slate-500 mt-2 italic text-lg">Companion table for {Article name}.</p>
            <div id="count" class="text-sm font-semibold text-blue-700 mt-4 bg-blue-50 border border-blue-100 inline-block px-4 py-1 rounded-full shadow-sm">
                Initializing...
            </div>
        </header>

        <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <div class="relative flex-1 w-full">
                <input type="text" id="searchInput" placeholder="Search datasets..." 
                    class="w-full p-4 pl-5 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg">
            </div>
            <button onclick="downloadCSV()" class="flex items-center justify-center gap-2 w-full md:w-auto px-6 py-4 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl shadow-sm hover:bg-slate-50 hover:border-blue-400 hover:text-blue-600 transition-all group">
                Export CSV
            </button>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-md overflow-hidden">
            <div class="overflow-hidden"> 
                <table class="text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider">
                        <tr>
                            <th onclick="sortData('Dataset')" class="p-4 font-bold text-slate-700 w-[18%]">Dataset ↕</th>
                            <th onclick="sortData('Published year')" class="p-4 font-bold text-slate-700 text-center w-[7%]">Year ↕</th>
                            <th class="p-4 font-bold text-slate-700 w-[8%]">Age</th>
                            <th onclick="sortData('Samples')" class="p-4 font-bold text-slate-700 w-[9%]">Samples ↕</th>
                            <th class="p-4 font-bold text-slate-700 w-[12%]">Modality</th>
                            <th class="p-4 font-bold text-slate-700 w-[8%] text-center">Link</th>
                            <th class="p-4 font-bold text-slate-700 w-[38%]">Reference</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-12 py-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>Interactive Index developed for academic review publication purposes.</p>
        </footer>
    </div>

    <script>
        let datasets = [];
        let currentFilteredData = [];
        let sortDirection = 1;

        async function loadData() {
            try {
                const response = await fetch('OpenSourceNeuroimagingDatasets.json');
                datasets = await response.json();
                currentFilteredData = datasets;
                renderTable(datasets);
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('count').innerText = "Connection error.";
            }
        }

        function sortData(key) {
            sortDirection *= -1;
            const sorted = [...currentFilteredData].sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';
                if (key === 'Samples' || key === 'Published year') {
                    valA = parseInt(String(valA).replace(/,/g, '')) || 0;
                    valB = parseInt(String(valB).replace(/,/g, '')) || 0;
                }
                if (valA < valB) return -1 * sortDirection;
                if (valA > valB) return 1 * sortDirection;
                return 0;
            });
            renderTable(sorted);
        }

        function renderTable(data) {
            currentFilteredData = data;
            const body = document.getElementById('tableBody');
            const countDiv = document.getElementById('count');
            countDiv.innerText = `Displaying ${data.length} Datasets`;

            body.innerHTML = data.map(d => {
                let rawYear = d['Published year'];
                let displayYear = rawYear ? Math.trunc(parseFloat(rawYear)) : '';

                return `
                <tr class="hover:bg-blue-50/40 transition-colors group">
                    <td class="p-4 font-bold text-blue-900 break-words">${d.Dataset || ''}</td>
                    <td class="p-4 text-slate-500 text-center font-medium">${displayYear}</td>
                    <td class="p-4 text-slate-600 font-medium whitespace-nowrap">${d['Age range'] || ''}</td>
                    <td class="p-4 text-slate-800 font-bold">${d.Samples || ''}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 bg-white border border-slate-200 text-slate-600 text-[10px] uppercase rounded font-bold shadow-sm whitespace-nowrap">
                            ${d.Modality || ''}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <a href="${d['Data link'] || '#'}" target="_blank" class="inline-flex items-center px-3 py-1.5 bg-blue-600 text-white text-[10px] rounded hover:bg-blue-800 transition-all font-bold whitespace-nowrap">
                            Link ↗
                        </a>
                    </td>
                    <td class="p-4 text-[11px] italic text-slate-400 relative">
                        <div class="truncate w-full group-hover:whitespace-normal group-hover:text-slate-700 transition-all duration-200">
                            ${d.Reference || ''}
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function downloadCSV() {
            if (currentFilteredData.length === 0) return;
            const headers = ["Dataset", "Published year", "Age range", "Samples", "Modality", "Data link", "Reference"];
            const csvRows = [
                headers.join(','), 
                ...currentFilteredData.map(row => 
                    headers.map(fieldName => {
                        let val = row[fieldName] || '';
                        if(fieldName === "Published year") val = val ? Math.trunc(parseFloat(val)) : '';
                        return `"${String(val).replace(/"/g, '""')}"`;
                    }).join(',')
                )
            ];
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "NeuroDatasets_Export.csv";
            link.click();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = datasets.filter(d => 
                Object.values(d).some(val => String(val).toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        loadData();
    </script>
</body>
</html>
