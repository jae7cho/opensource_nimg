<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Source Datasets Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        th { cursor: pointer; user-select: none; }
        th:hover { color: #2563eb !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Open-Source Datasets Index</h1>
            <p class="text-slate-500 mt-2">Table Companion for your Review Article</p>
            <div id="count" class="text-sm font-medium text-blue-600 mt-4 bg-blue-50 inline-block px-3 py-1 rounded-full">
                Loading datasets...
            </div>
        </header>

        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="Search datasets, modalities, or years..." 
                class="w-full p-4 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th onclick="sortData('Dataset')" class="p-4 font-semibold text-slate-600">Dataset ↕</th>
                            <th onclick="sortData('Published year')" class="p-4 font-semibold text-slate-600">Year ↕</th>
                            <th class="p-4 font-semibold text-slate-600">Age Range</th>
                            <th onclick="sortData('Samples')" class="p-4 font-semibold text-slate-600">Samples ↕</th>
                            <th class="p-4 font-semibold text-slate-600">Modality</th>
                            <th class="p-4 font-semibold text-slate-600">Link</th>
                            <th class="p-4 font-semibold text-slate-600">Reference</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let datasets = [];
        let sortDirection = 1;

        async function loadData() {
            try {
                const response = await fetch('OpenSourceNeuroimagingDatasets.json');
                datasets = await response.json();
                renderTable(datasets);
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('count').innerText = "Error loading data. Check filename casing!";
            }
        }

        function sortData(key) {
            sortDirection *= -1;
            const sorted = [...datasets].sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';
                
                // Clean up numbers for sorting (e.g., "41,520" -> 41520)
                if (key === 'Samples' || key === 'Published year') {
                    valA = parseInt(valA.replace(/,/g, '')) || 0;
                    valB = parseInt(valB.replace(/,/g, '')) || 0;
                }

                if (valA < valB) return -1 * sortDirection;
                if (valA > valB) return 1 * sortDirection;
                return 0;
            });
            renderTable(sorted);
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            const countDiv = document.getElementById('count');
            countDiv.innerText = `Showing ${data.length} datasets`;

            body.innerHTML = data.map(d => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold text-blue-700">${d.Dataset || ''}</td>
                    <td class="p-4 text-slate-500">${d['Published year'] || ''}</td>
                    <td class="p-4 text-sm">${d['Age range'] || ''}</td>
                    <td class="p-4 text-slate-600 font-medium">${d.Samples || ''}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] uppercase tracking-wider rounded-md font-bold border border-blue-100">
                            ${d.Modality || ''}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <a href="${d['Data link'] || '#'}" target="_blank" class="inline-flex items-center px-3 py-1 bg-slate-100 text-slate-700 text-xs rounded-lg hover:bg-blue-600 hover:text-white transition-all font-bold">
                            Source ↗
                        </a>
                    </td>
                    <td class="p-4 text-[12px] italic text-slate-400 max-w-xs truncate" title="${d.Reference || ''}">
                        ${d.Reference || ''}
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = datasets.filter(d => 
                Object.values(d).some(val => String(val).toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        loadData();
    </script>
</body>
</html>
