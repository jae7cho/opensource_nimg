<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Source Datasets Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Open-Source Datasets Index</h1>
            <p class="text-slate-500 mt-2">Table Companion for {article name}.</p>
        </header>

        <div class="mb-6">
            <input type="text" id="searchInput" placeholder="Search datasets, modalities, or years..." 
                class="w-full p-4 rounded-xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-semibold text-slate-600">Dataset</th>
                            <th class="p-4 font-semibold text-slate-600">Year</th>
                            <th class="p-4 font-semibold text-slate-600">Age Range</th>
                            <th class="p-4 font-semibold text-slate-600">Samples</th>
                            <th class="p-4 font-semibold text-slate-600">Modality</th>
                            <th class="p-4 font-semibold text-slate-600">Link</th>
                            <th class="p-4 font-semibold text-slate-600">Reference</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let datasets = [];

        // Load JSON data
        async function loadData() {
            try {
                const response = await fetch('OpenSourceNeuroimagingDatasets.json');
                datasets = await response.json();
                renderTable(datasets);
            } catch (err) {
                console.error("Error loading JSON:", err);
            }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = data.map(d => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold text-blue-700">${d.dataset || ''}</td>
                    
                    <td class="p-4 text-slate-500">${d['published year'] || ''}</td>
                    
                    <td class="p-4">${d['age range'] || d['age_range'] || ''}</td>
                    
                    <td class="p-4 text-slate-600 font-medium">${d.samples || ''}</td>
                    
                    <td class="p-4">
                        <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-md font-semibold underline decoration-blue-200">
                            ${d.modality || ''}
                        </span>
                    </td>
                    <td class="p-4">
                        <a href="${d['data link'] || '#'}" target="_blank" class="text-blue-500 hover:text-blue-800">
                            Data Link ↗
                        </a>
                    </td>
                    <td class="p-4 text-sm italic text-slate-400">${d.reference || ''}</td>
                </tr>
            `).join('');
        }

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = datasets.filter(d => 
                Object.values(d).some(val => String(val).toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        loadData();
    </script>
</body>
</html>
